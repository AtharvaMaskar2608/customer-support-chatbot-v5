server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Generated per-container from the API_BASE env var — must never be cached.
    location = /env-config.js {
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
